services:
  42:
    image: ghcr.io/bretzel-app/42:0.10.1
    container_name: 42
    ports:
      - "3000:3000"
    volumes:
      - 42-data:/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - DATABASE_URL=/data/42.db
      - ORIGIN=${ORIGIN:-http://localhost:3000}
      # SMTP (optional — enables email notifications)
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USER=
      # - SMTP_PASS=
      # - SMTP_FROM=42 <noreply@example.com>
    restart: unless-stopped

volumes:
  42-data:
