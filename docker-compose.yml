services:
  42:
    image: ghcr.io/bretzel-app/42:0.11.0
    container_name: 42
    ports:
      - "3000:3000"
    volumes:
      - 42-data:/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - DATABASE_URL=/data/42.db
      - ORIGIN=${ORIGIN:-http://localhost:3000}
      # Email notifications (optional ÔÇö auto-enabled when SMTP_HOST is set)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
    restart: unless-stopped

volumes:
  42-data:
